<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Entre no CompraCerta e organize suas compras.">
  <title>Entrar — CompraCerta</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteúdo</a>
  <main id="main" class="auth-page">
    <section class="auth-brand" aria-label="Apresentação do CompraCerta">
      <div class="auth-brand-content">
        <div class="brand-lockup"><span class="brand-mark" aria-hidden="true">✓</span> CompraCerta</div>
        <h1>Sua compra leve, organizada e compartilhada.</h1>
        <p>Planeje a semana, marque o que já está no carrinho e mantenha toda a casa em sintonia.</p>
        <img class="auth-illustration" src="images/sacola-compras.png" alt="Sacola reutilizável com alimentos e uma lista marcada">
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card">
        <p class="eyebrow">Bem-vindo de volta</p>
        <h2>Entre na sua conta</h2>
        <p class="helper">Use qualquer e-mail e senha para navegar pelo protótipo.</p>

        <form id="login-form" class="form-stack" novalidate>
          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="voce@email.com" required>
            <span class="field-error" aria-live="polite"></span>
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <div class="field-control">
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Sua senha" required>
              <button class="password-toggle" type="button" data-password-toggle="password">Mostrar</button>
            </div>
            <span class="field-error" aria-live="polite"></span>
          </div>
          <label class="check-row"><input type="checkbox" name="remember"> Manter-me conectado</label>
          <button class="btn btn-primary btn-block" type="submit">Entrar</button>
          <div class="auth-links">
            <a class="text-link" href="cadastro.html">Criar uma conta</a>
            <button class="btn btn-ghost" type="button" onclick="App.toast('Enviamos as instruções de recuperação.')">Esqueci minha senha</button>
          </div>
        </form>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
