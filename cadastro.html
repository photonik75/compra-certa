<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar conta — CompraCerta</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteúdo</a>
  <main id="main" class="auth-page">
    <section class="auth-brand" aria-label="Benefícios do aplicativo">
      <div class="auth-brand-content">
        <div class="brand-lockup"><span class="brand-mark" aria-hidden="true">✓</span> CompraCerta</div>
        <h1>Menos esquecimentos. Mais tempo para você.</h1>
        <p>Crie listas, organize produtos por categoria e convide quem divide as compras com você.</p>
        <img class="auth-illustration" src="images/sacola-compras.png" alt="Sacola de compras repleta de alimentos frescos">
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card">
        <p class="eyebrow">Comece agora</p>
        <h2>Crie sua conta</h2>
        <p class="helper">Suas categorias iniciais serão criadas automaticamente.</p>

        <form id="signup-form" class="form-stack" novalidate>
          <div class="field"><label for="name">Nome</label><input id="name" name="name" autocomplete="name" placeholder="Como devemos chamar você?" required><span class="field-error"></span></div>
          <div class="field"><label for="email">E-mail</label><input id="email" name="email" type="email" autocomplete="email" placeholder="voce@email.com" required><span class="field-error"></span></div>
          <div class="form-row">
            <div class="field"><label for="password">Senha</label><div class="field-control"><input id="password" name="password" type="password" autocomplete="new-password" placeholder="Mínimo de 6 caracteres" required><button class="password-toggle" type="button" data-password-toggle="password">Mostrar</button></div><span class="field-error"></span></div>
            <div class="field"><label for="confirm">Confirmar senha</label><input id="confirm" name="confirm" type="password" autocomplete="new-password" placeholder="Repita a senha" required><span class="field-error"></span></div>
          </div>
          <button class="btn btn-primary btn-block" type="submit">Criar conta</button>
          <p style="text-align:center; margin:.25rem 0 0">Já tem uma conta? <a class="text-link" href="index.html">Entrar</a></p>
        </form>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
